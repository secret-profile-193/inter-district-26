<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Sports Memories Gallery – a beautiful client-side photo & video gallery with favorites, albums, fullscreen viewer and more." />
    <title>Sports Memories Gallery</title>

    <!-- Bootstrap 5.3.3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- ═══════════════════════════════════════ LOADING SCREEN ═══════════════════════════════════════ -->
    <div id="loadingScreen" class="loading-screen" role="status" aria-live="polite">
        <canvas id="particleCanvas"></canvas>
        <div class="loading-content">
            <div class="loading-logo">
                <i class="bi bi-trophy-fill loading-icon"></i>
                <div class="logo-pulse-ring"></div>
            </div>
            <h1 class="loading-title">Sports Memories</h1>
            <p class="loading-subtitle">Loading your memories…</p>
            <div class="loading-progress-wrap">
                <div class="loading-progress-bar" id="loadProgressBar"></div>
            </div>
            <span class="loading-percent" id="loadPercent">0%</span>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ MAIN APP (hidden until loaded) ═══════════════════════ -->
    <div id="appShell" class="app-shell d-none">

        <!-- ─────────────────── TOP NAVBAR ─────────────────── -->
        <nav class="navbar navbar-dark navbar-main fixed-top px-3 px-lg-4" id="mainNavbar">
            <!-- Hamburger + Logo -->
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-icon d-lg-none" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarOffcanvas" aria-controls="sidebarOffcanvas" aria-label="Open sidebar">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                    <i class="bi bi-trophy-fill brand-icon"></i>
                    <span class="brand-text">Inter District 2026</span>
                </a>
            </div>

            <!-- Center Heading -->
            <!-- <div class="navbar-heading mx-auto">
                <h1 class="nav-sports-title"></h1>
            </div> -->

            <!-- Right controls -->
            <div class="d-flex align-items-center gap-2">
                <!-- Bulk-select toggle -->
                <button class="btn btn-icon" id="bulkToggleBtn" title="Select items" aria-label="Toggle bulk selection">
                    <i class="bi bi-check2-square fs-5"></i>
                </button>
                <!-- View toggle -->
                <div class="view-toggle btn-group" role="group" aria-label="View mode">
                    <button type="button" class="btn btn-icon active" id="gridViewBtn" title="Grid view"
                        aria-label="Grid view">
                        <i class="bi bi-grid-3x3-gap-fill fs-5"></i>
                    </button>
                    <button type="button" class="btn btn-icon" id="listViewBtn" title="List view"
                        aria-label="List view">
                        <i class="bi bi-list-ul fs-5"></i>
                    </button>
                </div>
            </div>
        </nav>


        <!-- ─────────────────── SIDEBAR (Desktop + Offcanvas Mobile) ─────────────────── -->
        <!-- Desktop persistent sidebar -->
        <aside class="sidebar d-none d-lg-flex flex-column" id="desktopSidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav flex-grow-1">
                <ul class="sidebar-menu list-unstyled mb-0">
                    <li>
                        <button class="sidebar-item active" data-filter="all" aria-current="page">
                            <i class="bi bi-images"></i><span>All Media</span>
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-item" data-filter="photo">
                            <i class="bi bi-image"></i><span>Photos</span>
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-item" data-filter="video">
                            <i class="bi bi-play-circle"></i><span>Videos</span>
                        </button>
                    </li>
                    <li>
                        <button class="sidebar-item" data-filter="wishlist">
                            <i class="bi bi-heart-fill text-danger"></i><span>Wishlist</span>
                        </button>
                    </li>
                </ul>

                <div class="sidebar-divider"></div>
                <div class="sidebar-section-title">ALBUMS</div>

                <!-- Dynamic folder list injected by JS -->
                <ul class="sidebar-menu list-unstyled mb-0" id="folderList"></ul>

                <button class="btn btn-create-folder mt-2" id="createFolderBtn">
                    <i class="bi bi-folder-plus"></i> New Album
                </button>
            </nav>
        </aside>

        <!-- Mobile offcanvas sidebar -->
        <div class="offcanvas offcanvas-start offcanvas-sidebar" tabindex="-1" id="sidebarOffcanvas"
            aria-labelledby="sidebarLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="sidebarLabel">
                    <i class="bi bi-trophy-fill brand-icon me-2"></i>Sports Gallery
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    aria-label="Close"></button>
            </div>
            <div class="offcanvas-body p-0">
                <nav>
                    <ul class="sidebar-menu list-unstyled mb-0 pt-2">
                        <li>
                            <button class="sidebar-item active" data-filter="all" data-bs-dismiss="offcanvas">
                                <i class="bi bi-images"></i><span>All Media</span>
                            </button>
                        </li>
                        <li>
                            <button class="sidebar-item" data-filter="photo" data-bs-dismiss="offcanvas">
                                <i class="bi bi-image"></i><span>Photos</span>
                            </button>
                        </li>
                        <li>
                            <button class="sidebar-item" data-filter="video" data-bs-dismiss="offcanvas">
                                <i class="bi bi-play-circle"></i><span>Videos</span>
                            </button>
                        </li>
                        <li>
                            <button class="sidebar-item" data-filter="wishlist" data-bs-dismiss="offcanvas">
                                <i class="bi bi-heart-fill text-danger"></i><span>Wishlist</span>
                            </button>
                        </li>
                    </ul>
                    <div class="sidebar-divider"></div>
                    <div class="sidebar-section-title px-3">ALBUMS</div>
                    <ul class="sidebar-menu list-unstyled mb-0" id="folderListMobile"></ul>
                    <div class="px-3 mt-2">
                        <button class="btn btn-create-folder w-100" id="createFolderBtnMobile"
                            data-bs-dismiss="offcanvas">
                            <i class="bi bi-folder-plus"></i> New Album
                        </button>
                    </div>
                </nav>
            </div>
        </div>

        <!-- ─────────────────── MAIN CONTENT ─────────────────── -->
        <main class="main-content" id="mainContent">

            <!-- Bulk select action bar -->
            <div class="bulk-bar d-none" id="bulkBar">
                <span id="bulkCount">0 selected</span>
                <div class="bulk-actions d-flex gap-2">
                    <button class="bulk-btn bulk-btn--download" id="bulkDownloadBtn">
                        <i class="bi bi-download"></i> Download
                    </button>
                    <button class="bulk-btn bulk-btn--album" id="bulkFolderBtn">
                        <i class="bi bi-folder-plus"></i> Add to Album
                    </button>
                    <button class="bulk-btn bulk-btn--cancel" id="bulkCancelBtn">
                        <i class="bi bi-x"></i> Cancel
                    </button>
                </div>
            </div>


            <!-- Section header -->
            <div class="section-header" id="sectionHeader">
                <h2 class="section-title" id="sectionTitle">All Media</h2>
                <span class="media-count" id="mediaCount"></span>
            </div>

            <!-- Masonry Grid -->
            <div class="masonry-grid" id="masonryGrid" role="list" aria-label="Media gallery">
                <!-- Cards injected by JS -->
            </div>

            <!-- Empty state -->
            <div class="empty-state d-none" id="emptyState">
                <i class="bi bi-camera-video-off-fill"></i>
                <p>No media found</p>
                <small>Try a different search or filter.</small>
            </div>
        </main>
    </div>

    <!-- ═══════════════════════════════════════ FULLSCREEN VIEWER MODAL ════════════════════════════ -->
    <div class="viewer-modal" id="viewerModal" role="dialog" aria-modal="true" aria-label="Media viewer"
        aria-hidden="true">
        <!-- Top bar -->
        <div class="viewer-topbar">
            <div class="viewer-info">
                <span class="viewer-filename" id="viewerFilename"></span>
                <span class="viewer-date" id="viewerDate"></span>
            </div>
            <div class="viewer-actions d-flex align-items-center gap-2">
                <button class="btn btn-icon-glass" id="viewerWishlistBtn" title="Toggle Wishlist (F)"
                    aria-label="Toggle wishlist">
                    <i class="bi bi-heart"></i>
                </button>
                <button class="btn btn-icon-glass" id="viewerFolderBtn" title="Add to Album" aria-label="Add to album">
                    <i class="bi bi-folder-plus"></i>
                </button>
                <button class="btn btn-icon-glass" id="viewerDownloadBtn" title="Download (D)" aria-label="Download">
                    <i class="bi bi-download"></i>
                </button>
                <button class="btn btn-icon-glass" id="viewerCloseBtn" title="Close (Esc)" aria-label="Close viewer">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>

        <!-- Navigation arrows -->
        <button class="viewer-nav viewer-prev" id="viewerPrev" aria-label="Previous">
            <i class="bi bi-chevron-left"></i>
        </button>
        <button class="viewer-nav viewer-next" id="viewerNext" aria-label="Next">
            <i class="bi bi-chevron-right"></i>
        </button>

        <!-- Media stage -->
        <div class="viewer-stage" id="viewerStage">
            <div class="viewer-media-wrap" id="viewerMediaWrap">
                <!-- img or video injected by JS -->
            </div>

            <!-- Zoom controls (images only) -->
            <div class="zoom-controls" id="zoomControls">
                <button class="btn btn-icon-glass btn-sm" id="zoomInBtn" aria-label="Zoom in"><i
                        class="bi bi-zoom-in"></i></button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="btn btn-icon-glass btn-sm" id="zoomOutBtn" aria-label="Zoom out"><i
                        class="bi bi-zoom-out"></i></button>
                <button class="btn btn-icon-glass btn-sm" id="zoomResetBtn" aria-label="Reset zoom"><i
                        class="bi bi-aspect-ratio"></i></button>
            </div>
        </div>

        <!-- Filmstrip -->
        <div class="viewer-filmstrip-wrap" id="filmstripWrap">
            <div class="viewer-filmstrip" id="viewerFilmstrip">
                <!-- Thumbnails injected by JS -->
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ CREATE FOLDER MODAL ═══════════════════════════════ -->
    <div class="modal fade" id="createFolderModal" tabindex="-1" aria-labelledby="createFolderModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content glass-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="createFolderModalLabel">
                        <i class="bi bi-folder-plus me-2 text-accent"></i>New Album
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control input-glass" id="folderNameInput" placeholder="Album name…"
                        maxlength="40" autocomplete="off" />
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-accent" id="confirmCreateFolder">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ ADD TO FOLDER MODAL ═══════════════════════════════ -->
    <div class="modal fade" id="addToFolderModal" tabindex="-1" aria-labelledby="addToFolderModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="addToFolderModalLabel">
                        <i class="bi bi-collection me-2 text-accent"></i>Add to Album
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="folderPickerList" class="folder-picker-list">
                        <!-- injected by JS -->
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-outline-accent w-100" id="addToFolderCreateNew">
                            <i class="bi bi-folder-plus me-1"></i> Create New Album
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ TOAST NOTIFICATION ════════════════════════════════ -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="appToast" class="toast align-items-center border-0 glass-toast" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">
                    <i class="bi bi-check-circle-fill me-2 text-accent"></i>
                    <span id="toastMessage"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="js/app.js"></script>
</body>

</html>
